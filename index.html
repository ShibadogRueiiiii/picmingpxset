/* 清圖 */
function clearMap(){
    layers.forEach(l=>map.removeLayer(l));
    layers=[];
}

/* GPS A */
function parseInput(){
    let text=document.getElementById("gps").value.trim();
    let lines=text.split(/\n+/);

    let pts=[];
    let seen={};
    let duplicates=[];

    lines.forEach((l,index)=>{
        let p=l.split(",");
        if(p.length==2){
            let lat=parseFloat(p[0]);
            let lon=parseFloat(p[1]);

            if(!isNaN(lat)&&!isNaN(lon)){

                let key=lat.toFixed(7)+","+lon.toFixed(7);

                if(seen[key]!==undefined){
                    duplicates.push({
                        line1:seen[key]+1,
                        line2:index+1,
                        value:key
                    });
                }else{
                    seen[key]=index;
                }

                pts.push({lat,lon});
            }
        }
    });

    return pts;
}

/* GPS B */
function parseInput2(){
    let text=document.getElementById("gps2").value.trim();
    let lines=text.split(/\n+/);

    let pts=[];
    let seen={};
    let duplicates=[];

    lines.forEach((l,index)=>{
        let p=l.split(",");
        if(p.length==2){
            let lat=parseFloat(p[0]);
            let lon=parseFloat(p[1]);

            if(!isNaN(lat)&&!isNaN(lon)){
                pts.push({lat,lon});
            }
        }
    });

    return pts;
}

/* 標籤 */
function createLabel(text){
    return L.divIcon({
        className:"",
        html:`<div class="label">${text}</div>`
    });
}

/* =========================
   🔧 8. 所有功能（完全保留）
========================= */

function preview(){
    clearMap();
    let base=parseInput();

    let route=[];

    base.forEach((p,i)=>{
        L.marker([p.lat,p.lon],{
            icon:createLabel(i+1)
        }).addTo(map);

        route.push([p.lat,p.lon]);
    });

    let line=L.polyline(route,{
        color:"black",
        weight:4
    }).addTo(map);

    map.fitBounds(line.getBounds());
}

function previewDualRoute(){
    clearMap();

    let A=parseInput();
    let B=parseInput2();

    let bounds=[];

    let lineA=[], lineB=[];

    A.forEach((p,i)=>{
        L.marker([p.lat,p.lon],{
            icon:createLabel("A"+(i+1))
        }).addTo(map);

        lineA.push([p.lat,p.lon]);
        bounds.push([p.lat,p.lon]);
    });

    B.forEach((p,i)=>{
        L.marker([p.lat,p.lon],{
            icon:createLabel("B"+(i+1))
        }).addTo(map);

        lineB.push([p.lat,p.lon]);
        bounds.push([p.lat,p.lon]);
    });

    if(lineA.length)
        L.polyline(lineA,{color:"black"}).addTo(map);

    if(lineB.length)
        L.polyline(lineB,{color:"red"}).addTo(map);

    if(bounds.length)
        map.fitBounds(bounds);
}

/* =========================
   🔧 9. GitHub 修正（只修變數）
========================= */

async function loadGithubFixedRoutes(){

    let bounds=[];

    for(let item of GITHUB_GPX_FILES){

        try{
            let res=await fetch(item.file);
            let text=await res.text();

            let xml=new DOMParser().parseFromString(text,"text/xml");
            let pts=[...xml.querySelectorAll("trkpt")].map(p=>[
                +p.getAttribute("lat"),
                +p.getAttribute("lon")
            ]);

            let line=L.polyline(pts,{
                color:item.color
            }).addTo(githubMap);

            githubLayers.push(line);

            pts.forEach(p=>bounds.push(p));

        }catch(e){
            console.log("load fail",item.file);
        }
    }

    if(bounds.length)
        githubMap.fitBounds(bounds);
}

/* =========================

const dropZone=document.getElementById("dropZone");

dropZone.addEventListener("dragover",e=>e.preventDefault());

dropZone.addEventListener("drop",e=>{
    e.preventDefault();

    let file=e.dataTransfer.files[0];
    let reader=new FileReader();

    reader.onload=e=>{
        let xml=new DOMParser().parseFromString(e.target.result,"text/xml");

        let pts=[...xml.querySelectorAll("trkpt")].map(p=>[
            +p.getAttribute("lat"),
            +p.getAttribute("lon")
        ]);

        L.polyline(pts,{color:"blue"}).addTo(publicMap);
        publicMap.fitBounds(pts);
    };

    reader.readAsText(file);
});
