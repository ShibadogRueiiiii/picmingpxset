<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>皮克敏花農群 柴狗畫圖時間</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2}
header{background:#02C874;color:white;padding:14px;font-size:20px}
.container{display:flex;height:calc(100vh - 64px)}
.left{width:360px;background:white;padding:18px;overflow:auto}
.right{flex:1;padding:16px;box-sizing:border-box;background:#e9eef3;}
textarea{width:90%;height:500px;padding:12px;border-radius:40px;border:1px solid #ccc;font-size:14px;}
button{width:100%;margin-top:8px;padding:80px}
input{width:100%;margin-top:6px;padding:6px}
#map{height:100%;width:100%;border-radius:18px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.2);}
.small{font-size:12px;color:#0072E3}
.label{background:white;color:black;border:2px solid black;border-radius:999px;padding:6px 8px;font-size:12px;font-weight:bold;box-shadow:0 2px 6px rgba(0,0,0,0.25);}
/* 收果路線按鈕 */
.fruitBtn{background:#ff9800;color:white;border:none;padding:12px;border-radius:12px;font-size:15px;font-weight:bold;box-shadow:0 4px 10px rgba(255,152,0,0.4);}
.fruitBtn:hover{background:#ffb74d;transform:scale(1.03);}
/* 種花路線按鈕 */
.flowerBtn{background:#e91e63;color:white;border:none;padding:12px;border-radius:12px;font-size:15px;font-weight:bold;box-shadow:0 4px 10px rgba(233,30,99,0.4);}
.flowerBtn:hover{background:#f06292;transform:scale(1.03);}
/* 地圖預覽按鈕 */
.previewBtn{background:linear-gradient(135deg,#00c6ff,#0072ff);color:white;border:none;padding:14px;border-radius:14px;font-size:16px;font-weight:bold;
cursor:pointer;transition:0.2s;box-shadow:0 6px 16px rgba(0,114,255,0.35);}
.previewBtn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 10px 22px rgba(0,114,255,0.45);}
/* 種花預覽按鈕 */
.hexPreviewBtn{background:#8e24aa;color:white;border:none;padding:12px;border-radius:14px;font-size:15px;font-weight:bold;cursor:pointer;transition:0.2s;box-shadow:0 4px 12px rgba(142,36,170,0.35);}
.hexPreviewBtn:hover{transform:scale(1.03);background:#ab47bc;}
/* 一鍵下載按鈕 */
.allDownloadBtn{background:linear-gradient(135deg,#00c853,#64dd17);color:white;border:none;padding:14px;border-radius:14px;font-size:16px;font-weight:bold;cursor:pointer;transition:0.2s;box-shadow:0 6px 16px rgba(0,200,83,0.35);}
.allDownloadBtn:hover{transform:translateY(-2px) scale(1.02);}
</style>
</head>

<body>

<header>
GPSSetting<br>
Design By 鑰匙神偷
</header>

<div class="container">

<div class="left">

<p>上傳 GPX 檔</p>

<input type="file" id="fileInput" accept=".gpx">

<div class="small" id="count">
GPS點位數量：0
</div>

<p>GPS 座標</p>

<textarea id="gps"></textarea>

<label>中心擴展距離 (公尺)</label>
<input id="radius" type="number" value="30"/>

<div class="small">
收果路線：每個點將隨機往外偏移 50 公尺後串聯成 GPX
</div>

<button class="previewBtn" onclick="preview()">
🗺️ 地圖預覽
</button>

<button class="hexPreviewBtn" onclick="previewHexRoute()">
🌸 種花路線預覽
</button>

<button class="fruitBtn" onclick="downloadOriginal()">
下載 收果路線 GPX
</button>

<button class="flowerBtn" onclick="downloadHex()">
下載 種花路線 GPX
</button>

<button class="allDownloadBtn" onclick="downloadAllRoutes()">
⬇️ 一鍵下載 收果 + 種花
</button>

</div>

<div class="right">
<div id="map"></div>
</div>

</div>

<script>

let map=L.map('map').setView([20,120],4)

L.tileLayer(
'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map)

let layers=[]

/* GPX解析器 */

document.getElementById("fileInput").addEventListener("change", function(e){

const file=e.target.files[0]

if(!file) return

const reader=new FileReader()

reader.onload=function(event){

const text=event.target.result

const parser=new DOMParser()

const xml=parser.parseFromString(text,"text/xml")

const points=xml.querySelectorAll("trkpt,wpt,rtept")

let result=[]

points.forEach(p=>{

let lat=p.getAttribute("lat")
let lon=p.getAttribute("lon")

if(lat && lon){

result.push(lat+","+lon)

}

})

document.getElementById("gps").value=result.join("\n")

document.getElementById("count").innerText=
"GPS點位數量："+result.length

}

reader.readAsText(file)

})

function clearMap(){
layers.forEach(l=>map.removeLayer(l))
layers=[]
}

function parseInput(){

let text=document.getElementById("gps").value.trim()

let lines=text.split(/\n+/)

let pts=[]

lines.forEach(l=>{

let p=l.split(",")

if(p.length==2){

let lat=parseFloat(p[0])
let lon=parseFloat(p[1])

if(!isNaN(lat)&&!isNaN(lon)){

pts.push({lat:lat,lon:lon})

}

}

})

return pts

}

function metersToLat(m){

return m/111320

}

function metersToLon(m,lat){

return m/(111320*Math.cos(lat*Math.PI/180))

}

/* 每個點隨機往外偏移固定50公尺 */

function randomOffsetPoint(pt,distanceMeters){

// 隨機方向角度
let angle=Math.random()*2*Math.PI

// X方向位移
let dx=distanceMeters*Math.cos(angle)

// Y方向位移
let dy=distanceMeters*Math.sin(angle)

// 轉換成經緯度
let lat=pt.lat+metersToLat(dy)
let lon=pt.lon+metersToLon(dx,pt.lat)

return {
lat:lat,
lon:lon
}

}

function hexExpand(pt,r){

let angles=[0,60,120,180,240,300]

let list=[]

angles.forEach((a,i)=>{

let rad=a*Math.PI/180

let dx=r*Math.cos(rad)
let dy=r*Math.sin(rad)

let lat=pt.lat+metersToLat(dy)
let lon=pt.lon+metersToLon(dx,pt.lat)

list.push({lat:lat,lon:lon,index:i+1})

})

return list

}

function createLabel(text){

return L.divIcon({

className:"",
html:'<div class="label">'+text+'</div>',
iconSize:[30,20]

})

}

/* 建立種花S型路線 */

function buildSnakeRoute(base,r){

let route=[]

base.forEach((p,i)=>{

route.push([p.lat,p.lon])

let hex=hexExpand(p,r)

hex.forEach(h=>{

route.push([h.lat,h.lon])

})

})

// 最後回到最後一個原始GPS點
let last=base[base.length-1]

route.push([last.lat,last.lon])

return route

}

function preview(){

clearMap()

let base=parseInput()

if(base.length==0) return

let route=[]

// 只顯示原始GPS點
base.forEach((p,i)=>{

let marker=L.marker([p.lat,p.lon],{
icon:createLabel(i+1)
}).addTo(map)

layers.push(marker)

route.push([p.lat,p.lon])

})

// 只連接原始GPS點
let line=L.polyline(route,{

color:"black",
weight:4,
opacity:0.9,
smoothFactor:1.5

}).addTo(map)

layers.push(line)

map.fitBounds(line.getBounds())

}
/* 種花路線預覽 */

function previewHexRoute(){

clearMap()

let base=parseInput()

let r=parseFloat(document.getElementById("radius").value)||30

if(base.length==0) return

let route=[]

base.forEach((p,i)=>{

// 主點
let marker=L.marker([p.lat,p.lon],{
icon:createLabel(i+1)
}).addTo(map)

layers.push(marker)

route.push([p.lat,p.lon])

// 六角點
let hex=hexExpand(p,r)

hex.forEach(h=>{

let label=(i+1)+"-"+h.index

let m=L.marker([h.lat,h.lon],{
icon:createLabel(label)
}).addTo(map)

layers.push(m)

route.push([h.lat,h.lon])

})

})

// 路線
let line=L.polyline(route,{

color:"#e91e63",
weight:4,
opacity:0.9,
smoothFactor:1.5

}).addTo(map)

layers.push(line)

map.fitBounds(line.getBounds())

}

function buildGPX(points){

let gpx='<?xml version="1.0"?>\n'

gpx+='<gpx version="1.1" creator="GPSSetting">\n'

gpx+='<trk><trkseg>\n'

points.forEach(p=>{

gpx+=`<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>\n`

})

gpx+='</trkseg></trk>\n'

gpx+='</gpx>'

return gpx

}

/* 國家翻譯 */

function translateCountry(name){

let table={

"India":"印度",
"Philippines":"菲律賓",
"Indonesia":"印尼",
"Thailand":"泰國",
"Malaysia":"馬來西亞",
"Vietnam":"越南",
"Taiwan":"台灣",
"Japan":"日本"

}

return table[name]||name

}

async function getCountry(lat,lon){

let url=`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`

let res=await fetch(url)

let data=await res.json()

if(data.address && data.address.country){

return translateCountry(data.address.country)

}

return "未知地區"

}

/* 收果路線 GPX */

async function downloadOriginal(){

let pts=parseInput()

if(pts.length==0) return

let country=await getCountry(pts[0].lat,pts[0].lon)

let count=pts.length

let filename=`${country} ${count}收.gpx`

let route=[]

pts.forEach(p=>{

// 每個點隨機偏移50公尺
let offset=randomOffsetPoint(p,50)

route.push([offset.lat,offset.lon])

})

// 最後回到最後一個原始GPS點
let last=pts[pts.length-1]

route.push([last.lat,last.lon])

let gpx=buildGPX(route)

downloadFile(filename,gpx)

}

/* 種花路線 GPX */

async function downloadHex(){

let base=parseInput()

let r=parseFloat(document.getElementById("radius").value)||30

if(base.length==0) return

let route=buildSnakeRoute(base,r)

let country=await getCountry(base[0].lat,base[0].lon)

let count=base.length

let filename=`${country} ${count}s.gpx`

let gpx=buildGPX(route)

downloadFile(filename,gpx)

}
/* 一鍵下載 收果 + 種花 */

async function downloadAllRoutes(){

await downloadOriginal()

setTimeout(async ()=>{

await downloadHex()

},500)

}

function downloadFile(name,content){

let blob=new Blob([content],{type:"application/gpx+xml"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url

a.download=name

a.click()

URL.revokeObjectURL(url)

}

</script>

</body>
</html>
