<script>

/* 主地圖 */

let map=L.map('map').setView([20,120],4)

L.tileLayer(
'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map)

let layers=[]

/* GPX解析器 */

document.getElementById("fileInput").addEventListener("change", function(e){

const file=e.target.files[0]

if(!file) return

const reader=new FileReader()

reader.onload=function(event){

const text=event.target.result

const parser=new DOMParser()

const xml=parser.parseFromString(text,"text/xml")

const points=xml.querySelectorAll("trkpt,wpt,rtept")

let result=[]

points.forEach(p=>{

let lat=p.getAttribute("lat")
let lon=p.getAttribute("lon")

if(lat && lon){

result.push(lat+","+lon)

}

})

document.getElementById("gps").value=result.join("\n")

document.getElementById("count").innerText=
"GPS點位數量："+result.length

}

reader.readAsText(file)

})

function clearMap(){
layers.forEach(l=>map.removeLayer(l))
layers=[]
}

function parseInput(){

let text=document.getElementById("gps").value.trim()

let lines=text.split(/\n+/)

let pts=[]

/* 用來檢查重複 */
let seen={}

let duplicates=[]

lines.forEach((l,index)=>{

let p=l.split(",")

if(p.length==2){

let lat=parseFloat(p[0])
let lon=parseFloat(p[1])

if(!isNaN(lat)&&!isNaN(lon)){

/* 統一格式 */
let key=lat.toFixed(7)+","+lon.toFixed(7)

/* 檢查是否重複 */
if(seen[key]!==undefined){

duplicates.push({
line1:seen[key]+1,
line2:index+1,
value:key
})

}else{

seen[key]=index

}

/* 加入點位 */
pts.push({
lat:lat,
lon:lon
})

}

}

})

/* 發現重複 */

if(duplicates.length>0){

let msg="你眼睛不好輸入到重複的了 給我去改掉\n\n"

duplicates.forEach(d=>{

msg+=`第 ${d.line1} 行 與 第 ${d.line2} 行重複\n`
msg+=`${d.value}\n\n`

})
/* 幫重複座標加上警告符號 */

let newLines=[...lines]

duplicates.forEach(d=>{

newLines[d.line1-1]="⚠️"+newLines[d.line1-1]
newLines[d.line2-1]="⚠️"+newLines[d.line2-1]

})

document.getElementById("gps").value=newLines.join("\n")
alert(msg)

}

return pts

}

/* 第二組 GPX解析器 */

document.getElementById("fileInput2").addEventListener("change", function(e){

const file=e.target.files[0]

if(!file) return

const reader=new FileReader()

reader.onload=function(event){

const text=event.target.result

const parser=new DOMParser()

const xml=parser.parseFromString(text,"text/xml")

const points=xml.querySelectorAll("trkpt,wpt,rtept")

let result=[]

points.forEach(p=>{

let lat=p.getAttribute("lat")
let lon=p.getAttribute("lon")

if(lat && lon){

result.push(lat+","+lon)

}

})

document.getElementById("gps2").value=result.join("\n")

}

reader.readAsText(file)

})
/* 第二組GPS解析 */

function parseInput2(){

let text=document.getElementById("gps2").value.trim()

let lines=text.split(/\n+/)

let pts=[]

/* 用來檢查重複 */
let seen={}

let duplicates=[]

lines.forEach((l,index)=>{

let p=l.split(",")

if(p.length==2){

let lat=parseFloat(p[0])
let lon=parseFloat(p[1])

if(!isNaN(lat)&&!isNaN(lon)){

let key=lat.toFixed(7)+","+lon.toFixed(7)

/* 檢查重複 */

if(seen[key]!==undefined){

duplicates.push({
line1:seen[key]+1,
line2:index+1,
value:key
})

}else{

seen[key]=index

}

pts.push({
lat:lat,
lon:lon
})

}

}

})

/* 發現重複 */

if(duplicates.length>0){

let msg="GPS B 你眼睛不好輸入到重複的了 給我去改掉\n\n"

duplicates.forEach(d=>{

msg+=`第 ${d.line1} 行 與 第 ${d.line2} 行重複\n`
msg+=`${d.value}\n\n`

})
/* 幫 GPS B 重複座標加上警告符號 */

let newLines=[...lines]

duplicates.forEach(d=>{

newLines[d.line1-1]="⚠️"+newLines[d.line1-1]
newLines[d.line2-1]="⚠️"+newLines[d.line2-1]

})

document.getElementById("gps2").value=newLines.join("\n")
alert(msg)

}

return pts

}
function checkDuplicateBetweenRoutes(){

    let textareaA = document.getElementById("gps")
    let textareaB = document.getElementById("gps2")

    let linesA = textareaA.value.trim().split(/\n+/)
    let linesB = textareaB.value.trim().split(/\n+/)

    let mapA = {}
    let duplicates = []

    linesA.forEach((line,index)=>{

        let clean = line.replace(/^⚠️|^❗️/,"").trim()

        let p = clean.split(",")

        if(p.length==2){

            let lat = parseFloat(p[0])
            let lon = parseFloat(p[1])

            if(!isNaN(lat) && !isNaN(lon)){

                let key = lat.toFixed(7)+","+lon.toFixed(7)

                mapA[key] = index
            }
        }
    })

    linesB.forEach((line,indexB)=>{

        let clean = line.replace(/^⚠️|^❗️/,"").trim()

        let p = clean.split(",")

        if(p.length==2){

            let lat = parseFloat(p[0])
            let lon = parseFloat(p[1])

            if(!isNaN(lat) && !isNaN(lon)){

                let key = lat.toFixed(7)+","+lon.toFixed(7)

                if(mapA[key] !== undefined){

                    duplicates.push({
                        value:key,
                        indexA:mapA[key],
                        indexB:indexB
                    })
                }
            }
        }
    })

    if(duplicates.length>0){

        let newLinesA = [...linesA]
        let newLinesB = [...linesB]

        let msg = "偵測到兩段路線有重複點\n\n"

        duplicates.forEach(d=>{

            msg += `重複點為 ${d.value}\n`

            if(!newLinesA[d.indexA].startsWith("❗️")){

                newLinesA[d.indexA] = "❗️"+newLinesA[d.indexA]
            }

            if(!newLinesB[d.indexB].startsWith("❗️")){

                newLinesB[d.indexB] = "❗️"+newLinesB[d.indexB]
            }

        })

        textareaA.value = newLinesA.join("\n")
        textareaB.value = newLinesB.join("\n")

        alert(msg)

        return true
    }

    return false
}    
function metersToLat(m){

return m/111320

}

function metersToLon(m,lat){

return m/(111320*Math.cos(lat*Math.PI/180))

}

/* 每個點隨機往外偏移固定50公尺 */

function randomOffsetPoint(pt,distanceMeters){

// 隨機方向角度
let angle=Math.random()*2*Math.PI

// X方向位移
let dx=distanceMeters*Math.cos(angle)

// Y方向位移
let dy=distanceMeters*Math.sin(angle)

// 轉換成經緯度
let lat=pt.lat+metersToLat(dy)
let lon=pt.lon+metersToLon(dx,pt.lat)

return {
lat:lat,
lon:lon
}

}

function hexExpand(pt,r){

let angles=[0,60,120,180,240,300]

let list=[]

angles.forEach((a,i)=>{

let rad=a*Math.PI/180

let dx=r*Math.cos(rad)
let dy=r*Math.sin(rad)

let lat=pt.lat+metersToLat(dy)
let lon=pt.lon+metersToLon(dx,pt.lat)

list.push({lat:lat,lon:lon,index:i+1})

})

return list

}

function createLabel(text){

return L.divIcon({

className:"",
html:'<div class="label">'+text+'</div>',
iconSize:[30,20]

})

}

/* 建立種花S型路線 */

function buildSnakeRoute(base,r){

let route=[]

base.forEach((p,i)=>{

route.push([p.lat,p.lon])

let hex=hexExpand(p,r)

hex.forEach(h=>{

route.push([h.lat,h.lon])

})

})

// 最後回到最後一個原始GPS點
let last=base[base.length-1]

route.push([last.lat,last.lon])

return route

}

function preview(){

clearMap()

let base=parseInput()

if(base.length==0) return

let route=[]

// 只顯示原始GPS點
base.forEach((p,i)=>{

let marker=L.marker([p.lat,p.lon],{
icon:createLabel(i+1)
}).addTo(map)

layers.push(marker)

route.push([p.lat,p.lon])

})

// 只連接原始GPS點
let line=L.polyline(route,{

color:"black",
weight:4,
opacity:0.9,
smoothFactor:1.5

}).addTo(map)

layers.push(line)

map.fitBounds(line.getBounds())

}
/* 種花路線預覽 */

function previewHexRoute(){

clearMap()

let base=parseInput()

let r=parseFloat(document.getElementById("radius").value)||30

if(base.length==0) return

let route=[]

base.forEach((p,i)=>{

// 主點
let marker=L.marker([p.lat,p.lon],{
icon:createLabel(i+1)
}).addTo(map)

layers.push(marker)

route.push([p.lat,p.lon])

// 六角點
let hex=hexExpand(p,r)

hex.forEach(h=>{

let label=(i+1)+"-"+h.index

let m=L.marker([h.lat,h.lon],{
icon:createLabel(label)
}).addTo(map)

layers.push(m)

route.push([h.lat,h.lon])

})

})

// 路線
let line=L.polyline(route,{

color:"#e91e63",
weight:4,
opacity:0.9,
smoothFactor:1.5

}).addTo(map)

layers.push(line)

map.fitBounds(line.getBounds())

}

/* 雙路線預覽 */

function previewDualRoute(){

clearMap()

let routeA=parseInput()

let routeB=parseInput2()

/* 檢查 A/B 重複點 */

checkDuplicateBetweenRoutes()

if(routeA.length==0 && routeB.length==0) return

let bounds=[]

/* A路線 */

if(routeA.length>0){

let lineA=[]

routeA.forEach((p,i)=>{

let marker=L.marker([p.lat,p.lon],{
icon:createLabel("A"+(i+1))
}).addTo(map)

layers.push(marker)

lineA.push([p.lat,p.lon])

bounds.push([p.lat,p.lon])

})

let polyA=L.polyline(lineA,{

color:"black",
weight:4,
opacity:0.9

}).addTo(map)

layers.push(polyA)

}

/* B路線 */

if(routeB.length>0){

let lineB=[]

routeB.forEach((p,i)=>{

let marker=L.marker([p.lat,p.lon],{
icon:createLabel("B"+(i+1))
}).addTo(map)

layers.push(marker)

lineB.push([p.lat,p.lon])

bounds.push([p.lat,p.lon])

})

let polyB=L.polyline(lineB,{

color:"red",
weight:4,
opacity:0.9

}).addTo(map)

layers.push(polyB)

}

/* 自動縮放 */

if(bounds.length>0){

map.fitBounds(bounds)

}

}

function buildGPX(points,name){

let gpx='<?xml version="1.0" encoding="UTF-8"?>\n'

gpx+='<gpx version="1.1" creator="GPSSetting">\n'

gpx+='<rte>\n'

gpx+=`<name>${name}</name>\n`

gpx+='<number>0</number>\n'

points.forEach(p=>{

gpx+=`<rtept lat="${p[0]}" lon="${p[1]}"></rtept>\n`

})

gpx+='</rte>\n'

gpx+='</gpx>'

return gpx

}

/* 國家翻譯 */

function translateCountry(name){

let table={

"India":"印度",
"Philippines":"菲律賓",
"Indonesia":"印尼",
"Thailand":"泰國",
"Malaysia":"馬來西亞",
"Vietnam":"越南",
"Taiwan":"台灣",
"Japan":"日本"

}

return table[name]||name

}

async function getCountry(lat,lon){

let url=`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`

let res=await fetch(url)

let data=await res.json()

if(data.address && data.address.country){

return translateCountry(data.address.country)

}

return "未知地區"

}

/* 準確收果路線 */

async function downloadAccurateRoute(){

let pts=parseInput()

if(pts.length==0) return

let country=await getCountry(pts[0].lat,pts[0].lon)

let count=pts.length

let custom=document.getElementById("customName").value.trim()

let baseName=custom || country

let filename=`${baseName} ${count}準確收.gpx`

let route=[]

// 完全使用原始GPS
pts.forEach(p=>{

route.push([p.lat,p.lon])

})

// 最後回到最後原始點
let last=pts[pts.length-1]

route.push([last.lat,last.lon])

let gpx=buildGPX(route,filename.replace(".gpx",""))

downloadFile(filename,gpx)

}

/* 收果路線 GPX */

async function downloadOriginal(){

let pts=parseInput()

if(pts.length==0) return

let country=await getCountry(pts[0].lat,pts[0].lon)

let count=pts.length

let custom=document.getElementById("customName").value.trim()

let baseName=custom || country

let filename=`${baseName} ${count}收.gpx`

let route=[]

pts.forEach(p=>{

// 每個點隨機偏移50公尺
let offset=randomOffsetPoint(p,50)

route.push([offset.lat,offset.lon])

})

// 最後回到最後一個原始GPS點
let last=pts[pts.length-1]

route.push([last.lat,last.lon])

let gpx=buildGPX(route,filename.replace(".gpx",""))

downloadFile(filename,gpx)

}

/* 種花路線 GPX */

async function downloadHex(){

let base=parseInput()

let r=parseFloat(document.getElementById("radius").value)||30

if(base.length==0) return

let route=buildSnakeRoute(base,r)

let country=await getCountry(base[0].lat,base[0].lon)

let count=base.length

let custom=document.getElementById("customName").value.trim()

let baseName=custom || country

let filename=`${baseName} ${count}種花.gpx`

let gpx=buildGPX(route,filename.replace(".gpx",""))

downloadFile(filename,gpx)

}
/* 一鍵下載 收果 + 種花 */

async function downloadAllRoutes(){

await downloadOriginal()

setTimeout(async ()=>{

await downloadHex()

},500)

}

function downloadFile(name,content){

let blob=new Blob([content],{type:"application/gpx+xml"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url

a.download=name

a.click()

URL.revokeObjectURL(url)

}


/* 載入全部公開GPX */

async function loadAllPublicGPX(){

let bounds=[]

for(let item of GPX_FILES){

try{

let res=await fetch(item.file)

let text=await res.text()

let parser=new DOMParser()

let xml=parser.parseFromString(text,"text/xml")

let points=xml.querySelectorAll("trkpt,rtept")

let route=[]

points.forEach(p=>{

let lat=parseFloat(p.getAttribute("lat"))
let lon=parseFloat(p.getAttribute("lon"))

route.push([lat,lon])

bounds.push([lat,lon])

})

if(route.length>0){

let line=L.polyline(route,{

color:item.color,
weight:4,
opacity:0.9

}).addTo(publicMap)

/* 點擊顯示檔名 */

line.bindPopup(item.file)

}

}catch(err){

console.log(item.file+" 載入失敗")

}

}

/* 自動縮放 */

if(bounds.length>0){

publicMap.fitBounds(bounds)

}

}

/* 啟動 */

let publicMap = L.map('publicMap').setView([20,120],4)

L.tileLayer(
'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
{ maxZoom: 19 }
).addTo(publicMap)

let publicLayers = []

loadAllPublicGPX()
// 顏色池
const colors = ["red","blue","green","orange","purple","black"]

// 清除公開圖層
function clearPublicMap(){
    publicLayers.forEach(l => publicMap.removeLayer(l))
    publicLayers = []
}

// 解析 GPX
function parseGPX(text){
    const parser = new DOMParser()
    const xml = parser.parseFromString(text,"text/xml")
    const pts = xml.querySelectorAll("trkpt,rtept")

    let route = []

    pts.forEach(p=>{
        let lat = parseFloat(p.getAttribute("lat"))
        let lon = parseFloat(p.getAttribute("lon"))
        if(!isNaN(lat) && !isNaN(lon)){
            route.push([lat,lon])
        }
    })

    return route
}

// 加入路線
function addRouteToPublic(route,name,color){

    let line = L.polyline(route,{
        color:color,
        weight:4,
        opacity:0.9
    }).addTo(publicMap)

    line.bindPopup(name)

    publicLayers.push(line)
}

// 拖曳區
const dropZone = document.getElementById("dropZone")
const publicFileInput = document.getElementById("publicFileInput")

publicFileInput.addEventListener("change", function(e){

    const files = e.target.files
    if(!files.length) return

    clearPublicMap()

    let bounds = []

    Array.from(files).forEach((file,i)=>{

        if(!file.name.endsWith(".gpx")) return

        const reader = new FileReader()

        reader.onload = function(ev){

            const route = parseGPX(ev.target.result)
            if(route.length == 0) return

            let color = colors[i % colors.length]

            addRouteToPublic(route, file.name, color)

            route.forEach(p => bounds.push(p))

            publicMap.fitBounds(bounds)
        }

        reader.readAsText(file)
    })
})
dropZone.addEventListener("dragover",e=>{
    e.preventDefault()
    dropZone.style.background = "#eaffea"
})

dropZone.addEventListener("dragleave",e=>{
    dropZone.style.background = "#f9fff9"
})

dropZone.addEventListener("drop",e=>{
    e.preventDefault()

    dropZone.style.background = "#f9fff9"

    const files = e.dataTransfer.files

    if(!files.length) return

    clearPublicMap()

    let bounds = []

    Array.from(files).forEach((file,i)=>{

        if(!file.name.endsWith(".gpx")) return

        const reader = new FileReader()

        reader.onload = function(ev){

            const route = parseGPX(ev.target.result)

            if(route.length==0) return

            let color = colors[i % colors.length]

            addRouteToPublic(route,file.name,color)

            route.forEach(p=>bounds.push(p))

            publicMap.fitBounds(bounds)

        }

        reader.readAsText(file)

    })
})
</script>
